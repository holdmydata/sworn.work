version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sworn_work
      POSTGRES_USER: sworn
      POSTGRES_PASSWORD: ISwearOnThisWork2026!
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sworn"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
